<!DOCTYPE html>
<!--
ChatGPT Runner via Puter.js
===========================
This HTML component runs ChatGPT queries using Puter.js (browser-side only).
No OpenAI API key required - uses Puter.js free tier.

Based on perplexity_runner.html pattern.

Expected injected variables (set by parent before embedding):
- CHATGPT_QUERIES: array of query strings
- CHATGPT_RUN_ID: string run ID
- CHATGPT_CALLBACK_URL: URL to POST results back (default: http://127.0.0.1:5679/chatgpt-results)
-->
<html>
<head>
    <meta charset="UTF-8">
    <title>ChatGPT Runner - Puter.js</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e1117;
            color: #fafafa;
            padding: 16px;
            font-size: 14px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #10a37f;
        }
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .status.info {
            background: #1e3a5f;
            border: 1px solid #4da6ff;
        }
        .status.success {
            background: #1a3d2e;
            border: 1px solid #4ade80;
        }
        .status.error {
            background: #3d1a1a;
            border: 1px solid #ef4444;
        }
        .status.warning {
            background: #3d3a1a;
            border: 1px solid #eab308;
        }
        .progress-container {
            margin-bottom: 16px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #262730;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10a37f, #1a7f5a);
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .results {
            margin-top: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .result-item {
            background: #1a1d24;
            border: 1px solid #262730;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .result-item.success {
            border-color: #10a37f;
        }
        .result-item.error {
            border-color: #ef4444;
        }
        .result-query {
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .result-preview {
            font-size: 12px;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-meta {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
        }
        button {
            background: #10a37f;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0d8a6a;
        }
        button:disabled {
            background: #374151;
            cursor: not-allowed;
        }
        .hidden {
            display: none;
        }
        .model-info {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 16px;
        }
    </style>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <div class="container">
        <h3>ChatGPT Query Runner (Puter.js)</h3>
        <div class="model-info">Model: gpt-4o-mini via Puter.js (free, no API key)</div>

        <div id="init-status" class="status info">
            Initializing Puter.js...
        </div>

        <div id="run-section" class="hidden">
            <button id="run-btn" onclick="runQueries()">Run ChatGPT Queries</button>
        </div>

        <div id="progress-section" class="hidden">
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div id="progress-text" class="progress-text">0 / 0 queries completed</div>
            </div>
        </div>

        <div id="results-section" class="results hidden"></div>

        <div id="final-status" class="hidden"></div>
    </div>

    <script>
        // Configuration - injected by server or use defaults
        var queries = window.CHATGPT_QUERIES || [];
        var runId = window.CHATGPT_RUN_ID || null;
        var callbackUrl = window.CHATGPT_CALLBACK_URL || 'http://127.0.0.1:5679/chatgpt-results';

        let completedCount = 0;
        let results = [];

        // Update UI progress
        function updateProgress(completed, total) {
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `${completed} / ${total} queries completed`;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add result to UI
        function addResultToUI(query, success, preview, latencyMs) {
            const resultsSection = document.getElementById('results-section');
            resultsSection.classList.remove('hidden');

            const item = document.createElement('div');
            item.className = `result-item ${success ? 'success' : 'error'}`;
            item.innerHTML = `
                <div class="result-query">${escapeHtml(query.substring(0, 80))}${query.length > 80 ? '...' : ''}</div>
                <div class="result-preview">${escapeHtml(preview.substring(0, 150))}${preview.length > 150 ? '...' : ''}</div>
                <div class="result-meta">${success ? 'OK' : 'FAILED'} | ${latencyMs}ms</div>
            `;
            resultsSection.appendChild(item);
        }

        // Run a single query via Puter.js
        async function runSingleQuery(query) {
            const startTime = Date.now();
            try {
                // Use gpt-4o-mini via Puter.js - FREE, no API key needed
                const response = await puter.ai.chat(query, {
                    model: 'gpt-4o-mini'
                });

                const latencyMs = Date.now() - startTime;

                // Extract response text
                const responseText = typeof response === 'string'
                    ? response
                    : (response?.message?.content || response?.content || JSON.stringify(response));

                return {
                    success: true,
                    query_text: query,
                    response_text: responseText,
                    latency_ms: latencyMs,
                    error_message: null
                };
            } catch (error) {
                const latencyMs = Date.now() - startTime;
                console.error(`Error querying ChatGPT for "${query}":`, error);

                // Check for auth error (401)
                if (error.message && (error.message.includes('401') || error.message.includes('Unauthorized') || error.message.includes('auth'))) {
                    document.getElementById('init-status').className = 'status error';
                    document.getElementById('init-status').innerHTML = `
                        <strong>Authentication required!</strong> Puter.js needs a free account.<br>
                        <button onclick="signInToPuter()" style="margin-top:10px;padding:8px 16px;background:#10a37f;color:white;border:none;border-radius:4px;cursor:pointer;font-size:14px;">
                            Sign In to Puter (Free)
                        </button>
                    `;
                    throw error; // Stop execution
                }

                return {
                    success: false,
                    query_text: query,
                    response_text: null,
                    latency_ms: latencyMs,
                    error_message: error.message || 'Unknown error'
                };
            }
        }

        // Submit all results to backend
        async function submitResults(results) {
            try {
                const response = await fetch(callbackUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        run_id: runId,
                        platform: 'chatgpt',
                        results: results
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return true;
            } catch (error) {
                console.error('Failed to submit results:', error);
                return false;
            }
        }

        // Main function to run all queries
        async function runQueries() {
            if (!queries.length) {
                document.getElementById('init-status').className = 'status warning';
                document.getElementById('init-status').textContent = 'No queries to run';
                return;
            }

            // Hide run button, show progress
            document.getElementById('run-section').classList.add('hidden');
            document.getElementById('progress-section').classList.remove('hidden');
            document.getElementById('init-status').textContent = 'Running ChatGPT queries via Puter.js...';

            const total = queries.length;
            let successCount = 0;
            let errorCount = 0;

            for (let i = 0; i < queries.length; i++) {
                const query = queries[i];
                let result;
                try {
                    result = await runSingleQuery(query);
                } catch (authError) {
                    // Auth error - stop and show sign-in button
                    document.getElementById('progress-section').classList.add('hidden');
                    return;
                }
                results.push(result);

                if (result.success) {
                    successCount++;
                    addResultToUI(query, true, result.response_text, result.latency_ms);
                } else {
                    errorCount++;
                    addResultToUI(query, false, result.error_message, result.latency_ms);
                }

                completedCount++;
                updateProgress(completedCount, total);

                // Small delay between queries
                if (i < queries.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }

            // Submit results to backend
            document.getElementById('init-status').textContent = 'Submitting results to backend...';
            const submitted = await submitResults(results);

            // Show final status
            const finalStatus = document.getElementById('final-status');
            finalStatus.classList.remove('hidden');

            if (errorCount === 0 && submitted) {
                finalStatus.className = 'status success';
                finalStatus.textContent = `Complete: ${successCount}/${total} queries successful. Results submitted.`;
            } else if (submitted) {
                finalStatus.className = 'status warning';
                finalStatus.textContent = `Complete: ${successCount} success, ${errorCount} failed. Results submitted.`;
            } else {
                finalStatus.className = 'status error';
                finalStatus.textContent = `Complete: ${successCount} success, ${errorCount} failed. Failed to submit results!`;
            }

            document.getElementById('init-status').classList.add('hidden');
        }

        // Sign in to Puter
        async function signInToPuter() {
            try {
                document.getElementById('init-status').textContent = 'Opening Puter sign-in...';
                await puter.auth.signIn();
                location.reload();
            } catch (e) {
                document.getElementById('init-status').className = 'status error';
                document.getElementById('init-status').textContent = 'Sign-in failed: ' + e.message;
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', async function() {
            // Check if Puter.js loaded
            if (typeof puter === 'undefined') {
                document.getElementById('init-status').className = 'status error';
                document.getElementById('init-status').textContent = 'Error: Puter.js failed to load. Check network/ad-blocker.';
                return;
            }

            // Get queries from URL params if not injected
            const urlParams = new URLSearchParams(window.location.search);
            const urlRunId = urlParams.get('run_id');

            if (urlRunId && !runId) {
                runId = urlRunId;
            }

            if (!queries.length) {
                document.getElementById('init-status').className = 'status warning';
                document.getElementById('init-status').textContent = 'No queries provided. Waiting for query injection...';
                return;
            }

            // Ready to run
            document.getElementById('init-status').className = 'status info';
            document.getElementById('init-status').textContent = `Ready: ${queries.length} queries to run via ChatGPT (gpt-4o-mini)`;
            document.getElementById('run-section').classList.remove('hidden');
        });
    </script>
</body>
</html>
